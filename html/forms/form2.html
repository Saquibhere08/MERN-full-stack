<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>Personal Details</legend>
        Username: <input type="text" name="Username" /> <br /><br />
        Password: <input type="password" name="password" /> <br /><br />
        Email: <input type="email" name="email" /> <br /><br />
        Age: <input type="Number" name="age" /> <br /><br />
        MobileNo.: <input type="tel" name="mobile" /> <br /><br />
      </fieldset>
      <fieldset>
        <legend>Age</legend>
        DOB:
        <input type="date" name="DOB" /> <br /><br />
        Month:
        <input type="month" name="month" /> <br /><br />
        Time:
        <input type="time" name="time" /> <br /><br />
        Week: w<input type="week" name="week" /> <br /><br />
      </fieldset>
      Resume: <input type="file" name="resume" /> <br /><br />
      Gender: <input type="radio" name="gender" value="male" />Male
      <input type="radio" name="gender" value="Female" />Female <br /><br />
      Languages: <input type="checkbox" name="Lang" value="English" />English
      <input type="checkbox" name="Lang" value="Hindi" />Hindi <br /><br />
      Volume: <input type="range" name="Volume" /> <br /><br />
      Search: <input type="search" name="Search" /> <br /><br />
      Hidden: <input type="hidden" name="deptno" value="30" /> <br /><br />
      URL: <input type="url" name="url" /> <br /><br />

      <input type="reset" /> <br /><br />
      <button>Submit</button> <br /><br />
      <input type="submit" /> <br /><br />
      <input
        type="image"
        height="50"
        width="50"
        src="https://cdn.pixabay.com/photo/2020/08/13/10/43/loop-button-5484820_1280.png"
        name="reset"
      />
      <br /><br />
      <input
        type="image"
        height="100"
        width="100"
        src="https://cdn.pixabay.com/photo/2022/05/28/07/35/apply-now-7226750_1280.png"
        name="submit"
      />
      <br /><br />
    </form>
  </body>
</html>
