<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h1>HTML Form - 1 (Unorganized)</h1>
        First Name: <input type="text" name="FirstName"></input> <br><br>
        Last Name: <input type="text" name="FirstName"></input> <br><br>
        Date of Birth: <input type="date"> <br><br>
        Email id <input type="email"> <br><br>
        MobileNo. : <input type="tel"> <br><br>
        <button>SUBMIT</button>
        <button>RESET</button>
        <hr>

        <h1>HTML Form -1 (Organized)</h1>
        <table cellpadding="12">
            <tr>
                <td><label for="fname">First Name</label></td>
                <td><input type="text"id=fname name="firstName"></td>
            </tr>
            <tr>
                <td><label for="lname"> Last Name</label></td>
                <td><input type="text"id=lname name="lastName"></td>
            </tr>
            <tr>
                <td><label for="dob">DOB</label></td>
                <td><input type="date"id=dob name="DATE"></td>
            </tr><tr>
                <td><label for="email">Email id: </label></td>
                <td><input type="email"id="email" name="Email"></td>
            </tr>
            <tr>
                <td><label for="mobile">Mobile No.</label></td>
                <td><input type="tel"id=mobile name="Mobile"></td>
            </tr>
            <button>OK</button>
            <button>Cancel</button>
        </table>
    </form>
</body>
</html>
