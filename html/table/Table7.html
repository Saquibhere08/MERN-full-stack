<!DOCTYPE html>
<html>
<head>
    <title>Nested Tables</title>
</head>
<body>

<h1>Container Table</h1>

<table border="5" width="100%" cellpadding="10">

    <tr>

        <!-- Top Left -->
        <td width="65%">

            <table border="3" width="100%" cellpadding="30">

                <tr>
                    <th colspan="2">
                        Nested Table 1
                    </th>
                </tr>

                <tr>
                    <th>Column 1</th>
                    <th>Column 2</th>
                </tr>

                <tr>
                    <td>Our First Table</td>
                    <td>Nested Within</td>
                </tr>

            </table>

        </td>

        <!-- Top Right -->
        <td width="35%">

            <table border="3" width="100%" cellpadding="30">

                <tr>
                    <th>Nested Table 2</th>
                </tr>

                <tr>
                    <td>
                        <ul>
                            <li>List Object 1</li>
                            <li>List Object 2</li>
                            <li>List Object 3</li>
                        </ul>
                    </td>
                </tr>

            </table>

        </td>

    </tr>

    <tr>

        <!-- Bottom Left -->
        <td>

            <table border="3" width="100%" cellpadding="30">

                <tr>
                    <th colspan="2">
                        Nested Table 3
                    </th>
                </tr>

                <tr>
                    <td>Nested Table</td>
                    <td>Demo Continued</td>
                </tr>

            </table>

        </td>

        <!-- Bottom Right -->
        <td>

            <table border="3" width="100%">

                <tr>
                    <th>Nested Table 4</th>
                </tr>

                <tr>
                    <td align="center">
                        <img src="https://cdn.pixabay.com/photo/2017/08/05/11/16/logo-2582748_1280.png" width="150" height="150">
                    </td>
                </tr>

            </table>

        </td>

    </tr>

</table>

</body>
</html>
